<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather — Sowmiya</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass: rgba(255,255,255,0.12);
      --glass-border: rgba(255,255,255,0.22);
      --glass-hover: rgba(255,255,255,0.18);
      --white: #ffffff;
      --white-60: rgba(255,255,255,0.6);
      --white-30: rgba(255,255,255,0.3);
      --white-10: rgba(255,255,255,0.1);
    }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      background: #1a1a2e;
      overflow-x: hidden;
      transition: background 1s ease;
    }

    /* ── DYNAMIC BACKGROUNDS ── */
    body.clear-day    { background: linear-gradient(135deg, #f5a623 0%, #f8780a 30%, #e8553a 70%, #c0392b 100%); }
    body.clear-night  { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); }
    body.cloudy       { background: linear-gradient(135deg, #4a5568 0%, #718096 50%, #a0aec0 100%); }
    body.rainy        { background: linear-gradient(135deg, #1a202c 0%, #2d3748 40%, #4a5568 100%); }
    body.snowy        { background: linear-gradient(135deg, #bee3f8 0%, #90cdf4 50%, #63b3ed 100%); }
    body.stormy       { background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #1a1a2e 100%); }
    body.default      { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }

    /* ── ANIMATED BG ORBS ── */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift linear infinite;
    }

    .orb1 { width: 400px; height: 400px; background: rgba(255,255,255,0.15); top: -100px; left: -100px; animation-duration: 20s; }
    .orb2 { width: 300px; height: 300px; background: rgba(255,255,255,0.1);  bottom: -80px; right: -80px; animation-duration: 25s; animation-direction: reverse; }
    .orb3 { width: 200px; height: 200px; background: rgba(255,255,255,0.08); top: 40%; left: 60%; animation-duration: 18s; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.05); }
      66%  { transform: translate(-20px, 40px) scale(0.95); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ── LAYOUT ── */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 40px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 6px 6px 6px 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--white);
      padding: 8px 0;
    }

    .search-input::placeholder { color: var(--white-30); }

    .search-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 10px 20px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .search-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
    .search-btn:active { transform: scale(0.97); }

    /* ── MAIN CARD ── */
    .weather-card {
      width: 100%;
      max-width: 480px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 40px 36px;
      backdrop-filter: blur(24px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: cardIn 0.5s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── LOCATION & TIME ── */
    .location-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .city-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 6px;
    }

    .country-name {
      font-size: 13px;
      color: var(--white-60);
      letter-spacing: 0.08em;
    }

    .time-block { text-align: right; }

    .current-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 4px;
    }

    .current-date {
      font-size: 12px;
      color: var(--white-60);
      letter-spacing: 0.06em;
    }

    /* ── TEMP & ICON ── */
    .temp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .temperature {
      font-family: 'Cormorant Garamond', serif;
      font-size: 96px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -4px;
    }

    .temp-unit {
      font-size: 36px;
      font-weight: 300;
      vertical-align: super;
      opacity: 0.7;
    }

    .weather-icon {
      font-size: 80px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.2));
      animation: floatIcon 4s ease-in-out infinite;
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .weather-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--white-60);
      margin-bottom: 32px;
      text-transform: capitalize;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--glass-border);
      margin-bottom: 24px;
    }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--white-10);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
      transition: background 0.2s;
    }

    .stat-box:hover { background: var(--glass-hover); }

    .stat-icon { font-size: 20px; margin-bottom: 8px; display: block; }
    .stat-val  { font-size: 18px; font-weight: 500; display: block; margin-bottom: 3px; }
    .stat-lbl  { font-size: 11px; color: var(--white-60); letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── FEELS LIKE ── */
    .feels-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white-10);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px 20px;
    }

    .feels-label { font-size: 13px; color: var(--white-60); }
    .feels-val   { font-size: 18px; font-weight: 500; }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .loading-spinner {
      width: 44px; height: 44px;
      border: 2px solid var(--white-30);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--white-60); font-size: 14px; }

    /* ── ERROR ── */
    .error-box {
      text-align: center;
      padding: 40px 20px;
    }

    .error-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .error-msg  { color: var(--white-60); font-size: 14px; line-height: 1.7; }

    /* ── WELCOME ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
    }

    .welcome-icon { font-size: 64px; margin-bottom: 16px; display: block; animation: floatIcon 4s ease-in-out infinite; }

    .welcome h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-style: italic;
      margin-bottom: 10px;
    }

    .welcome p { color: var(--white-60); font-size: 14px; line-height: 1.7; }

    /* ── API NOTE ── */
    .api-note {
      margin-top: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 12px;
      color: var(--white-60);
      line-height: 1.7;
      text-align: center;
    }

    .api-note a {
      color: var(--white);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--white-30);
      letter-spacing: 0.06em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .weather-card { padding: 28px 22px; border-radius: 24px; }
      .temperature  { font-size: 72px; }
      .weather-icon { font-size: 60px; }
      .city-name    { font-size: 28px; }
    }
  </style>
</head>
<body class="default">

<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Search city... e.g. Chennai, London"
        maxlength="60"
      />
      <button class="search-btn" id="searchBtn">Search</button>
    </div>
  </div>

  <!-- Card -->
  <div class="weather-card" id="weatherCard">
    <div class="welcome">
      <span class="welcome-icon">🌤️</span>
      <h2>Check the weather</h2>
      <p>Type any city name above<br>and hit Search!</p>
    </div>
  </div>

  <!-- API Note -->
  <div class="api-note" id="apiNote">
    💡 To make this app fetch <strong>real weather data</strong>, you need a free API key from
    <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a>.
    Replace <strong>YOUR_API_KEY</strong> in the code with your key!
  </div>

  <div class="footer">made with ☁️ by Sowmiya</div>
</div>

<script>
  var API_KEY = '237e96b974161d92e09328bc2870b2ea'; // 👈 Replace with your free key from openweathermap.org

  var searchInput = document.getElementById('searchInput');
  var searchBtn   = document.getElementById('searchBtn');
  var card        = document.getElementById('weatherCard');
  var apiNote     = document.getElementById('apiNote');

  // Weather icon mapping
  function getIcon(code, isDay) {
    var id = Math.floor(code / 100);
    if (code === 800) return isDay ? '☀️' : '🌙';
    if (code === 801) return '🌤️';
    if (code === 802) return '⛅';
    if (code === 803 || code === 804) return '☁️';
    if (id === 2) return '⛈️';
    if (id === 3) return '🌦️';
    if (id === 5) return '🌧️';
    if (id === 6) return '❄️';
    if (id === 7) return '🌫️';
    return '🌡️';
  }

  // Background theme
  function setTheme(code, isDay) {
    var body = document.body;
    body.className = '';
    if (code === 800 && isDay)  { body.classList.add('clear-day'); return; }
    if (code === 800 && !isDay) { body.classList.add('clear-night'); return; }
    if (code >= 801 && code <= 804) { body.classList.add('cloudy'); return; }
    if (Math.floor(code/100) === 5) { body.classList.add('rainy'); return; }
    if (Math.floor(code/100) === 6) { body.classList.add('snowy'); return; }
    if (Math.floor(code/100) === 2) { body.classList.add('stormy'); return; }
    body.classList.add('default');
  }

  // Format time — uses local browser time for demo, city time for real data
  function formatTime(unix, offset, isDemo) {
    if (isDemo) {
      var now = new Date();
      var h = now.getHours();
      var m = now.getMinutes().toString().padStart(2,'0');
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return h + ':' + m + ' ' + ampm;
    }
    // offset is in seconds from OpenWeatherMap
    var d = new Date((unix + offset) * 1000);
    var h = d.getUTCHours();
    var m = d.getUTCMinutes().toString().padStart(2,'0');
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + m + ' ' + ampm;
  }

  // Format date — uses local browser date for demo, city date for real data
  function formatDate(unix, offset, isDemo) {
    var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if (isDemo) {
      var now = new Date();
      return days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' ' + now.getFullYear();
    }
    var d = new Date((unix + offset) * 1000);
    return days[d.getUTCDay()] + ', ' + months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }

  // Show loading
  function showLoading() {
    card.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Fetching weather...</p></div>';
  }

  // Show error
  function showError(msg) {
    card.innerHTML = '<div class="error-box"><span class="error-icon">😶‍🌫️</span><p class="error-msg">' + msg + '</p></div>';
    document.body.className = 'default';
  }

  // Show demo data (when no API key)
  function showDemo(city) {
    var demos = {
      default: { temp: 28, feels: 31, humidity: 72, wind: 14, desc: 'partly cloudy', code: 802, pressure: 1012 }
    };
    var data = demos.default;
    var now  = Math.floor(Date.now() / 1000);
    var isDay = true;
    setTheme(data.code, isDay);
    renderWeather({
      city: city || 'Your City',
      country: '🌍',
      temp: data.temp,
      feels: data.feels,
      humidity: data.humidity,
      wind: data.wind,
      desc: data.desc,
      icon: getIcon(data.code, isDay),
      pressure: data.pressure,
      time: formatTime(now, 0, true),
      date: formatDate(now, 0, true),
      isDemo: true
    });
  }

  // Render weather card
  function renderWeather(w) {
    apiNote.style.display = w.isDemo ? 'block' : 'none';
    card.innerHTML =
      '<div class="location-row">' +
        '<div>' +
          '<div class="city-name">' + w.city + '</div>' +
          '<div class="country-name">' + w.country + '</div>' +
        '</div>' +
        '<div class="time-block">' +
          '<div class="current-time">' + w.time + '</div>' +
          '<div class="current-date">' + w.date + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="temp-row">' +
        '<div class="temperature">' + Math.round(w.temp) + '<span class="temp-unit">°C</span></div>' +
        '<div class="weather-icon">' + w.icon + '</div>' +
      '</div>' +
      '<div class="weather-desc">' + w.desc + '</div>' +
      '<div class="divider"></div>' +
      '<div class="stats-grid">' +
        '<div class="stat-box"><span class="stat-icon">💧</span><span class="stat-val">' + w.humidity + '%</span><span class="stat-lbl">Humidity</span></div>' +
        '<div class="stat-box"><span class="stat-icon">💨</span><span class="stat-val">' + w.wind + ' km/h</span><span class="stat-lbl">Wind</span></div>' +
        '<div class="stat-box"><span class="stat-icon">🌡️</span><span class="stat-val">' + w.pressure + ' hPa</span><span class="stat-lbl">Pressure</span></div>' +
      '</div>' +
      '<div class="feels-row">' +
        '<span class="feels-label">Feels like</span>' +
        '<span class="feels-val">' + Math.round(w.feels) + '°C</span>' +
      '</div>' +
      (w.isDemo ? '<div style="margin-top:14px;text-align:center;font-size:12px;color:rgba(255,255,255,0.4);">⚠️ Demo data — add API key for real weather</div>' : '');
  }

  // Fetch real weather using XMLHttpRequest
  function fetchWeather(city) {
    if (API_KEY === 'DEMO_MODE') {
      showDemo(city);
      return;
    }

    showLoading();
    var url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(city) + '&appid=' + API_KEY + '&units=metric';

    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.cod == 404) { showError("City not found 😕<br>Please check the spelling and try again!"); return; }
        if (data.cod == 401) { showError("Invalid API key 🔑<br>Please check your key!"); return; }
        if (data.cod != 200) { showError("Error: " + (data.message || 'Please try again!')); return; }
        var now    = data.dt;
        var offset = data.timezone;
        var isDay  = now > data.sys.sunrise && now < data.sys.sunset;
        setTheme(data.weather[0].id, isDay);
        renderWeather({
          city:     data.name,
          country:  data.sys.country,
          temp:     data.main.temp,
          feels:    data.main.feels_like,
          humidity: data.main.humidity,
          wind:     Math.round(data.wind.speed * 3.6),
          desc:     data.weather[0].description,
          icon:     getIcon(data.weather[0].id, isDay),
          pressure: data.main.pressure,
          time:     formatTime(now, offset, false),
          date:     formatDate(now, offset, false),
          isDemo:   false
        });
      } catch(e) {
        showError("Something went wrong 😔<br>Please try again!");
      }
    };
    xhr.onerror = function() {
      showError("Network error 😔<br>Please check your internet connection!");
    };
    xhr.send();
  }

  // Search handlers
  searchBtn.addEventListener('click', function() {
    var city = searchInput.value.trim();
    if (city) fetchWeather(city);
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var city = searchInput.value.trim();
      if (city) fetchWeather(city);
    }
  });
</script>

</body>
</html>
